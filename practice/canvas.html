<!Doctype html>
<html lang="en">
	<Head>
		<Title>This is a canvas</title>
	<style>
	canvas{
	border:black 1px solid;
	}
	</style>
	</head>
	<body>
		<h1>This is a canvas</H1>
		<canvas id="canvas" width="800" Height="800">
	</canvas>
	<script>
	const canvas= document.getElementById("canvas");
	const ctx = canvas.getContext("2d");

	//draw a green rectangle 
	ctx.fillStyle="purple";
        ctx.fillRect(0,0,800,800)
	ctx.fillStyle ="green"; 
	ctx.fillRect(100,100,200,300);
	ctx.fillStyle ="red";
	ctx.fillRect(400,50,100,100);
	
	ctx.fillStyle="black";
	ctx.strokeStyle = "red";
	ctx.lineWidth = 10;
	ctx.beginPath();
	ctx.arc(400,400,100,0,Math.PI);
	ctx.fill();
	ctx.stroke();
	ctx.fillStyle= "Blue";
	ctx.beginPath();
	ctx.ellipse(
		400,600,
		300,
		100,	
		0,	
		0,
		2*Math.PI
	);
	ctx.fill();
	ctx.beginPath();
	ctx.moveTo(700,10);
	ctx.lineTo(790,150);
	ctx.lineTo(610,150);
	ctx.lineTo(700,10);
	ctx.stroke();
	ctx.fill();
	</script>
	</body>
	</html>
