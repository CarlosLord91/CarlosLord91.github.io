<!Doctype html>
<html lang="en">
	<Head>
		<title>heart</title>
	<style>
	canvas{
	border:black 1px solid;
	}
	</style>
	</head>
	<body>
		<h1>This is a canvas</H1>
		<canvas id="canvas" width ="800" Height="800">
	 </canvas>
	<script>
	const canvas= document.getElementById("canvas");
	const ctx = canvas.getContext("2d");
	
	ctx.fillStyle="Lemonchiffon";
	ctx.fillRect(0,0,800,800)
	ctx.fillStyle="Blue";
	ctx.fillRect(250,400,400,500);
	ctx.fillStyle="blue";
	ctx.fillRect(150,385,100,100)
	ctx.fillStyle="blue";
	ctx.fillRect(640,385,100,100);
	ctx.fillStyle="F0AD7F";
	ctx.fillRect(0,0,100,100)
	ctx.fill();
	ctx.fill();
	ctx.fill();
	ctx.fill();
	ctx.fill();
	</script>
	</body>
	</html>
