<!DOCTYPE html>
<html lang="en">
        <head>
                <title>behold!the holy grail</title>
        <style>
        .grid {
         display: grid;
        height: 100vh;
        grid:
                'head  head' 100px
                'menu  main' 1fr
                'foot  foot' 200px
                /200px 1fr;
        }

        #header{
                grid-area: head;
                width: 100%;
                height:100%;
                background-color: Black;
                font-size: 24px;
                color:white;
        }
	#menu{
	grid-area: main;
	<img src="Download.jpeg" alt="Coffeee">
	width: 100%;
	height: 100%;
	}
        #foot{
         grid-area: foot;
                width: 100%;
                height:100%;
                background-color: Black;
                font-size: 24px;
                color:white;
        }
        </style>
        </head>
        <body>
                <div class="grid">
                <div id="header"></div>
		<div id="main"></div>
                <div id="foot"></div>
                </div>
                </body>
        </html>
